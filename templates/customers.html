{% extends "base.html" %}
{% set active = "customers" %}
{% block title %}Customers{% endblock %}
{% block page_title %}👤 Customers{% endblock %}
{% block content %}
<div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
  <input class="form-control form-control-sm" id="search" placeholder="🔍 Search name, phone, or CIN…" style="max-width:280px">
  <div class="d-flex gap-2">
    <button class="btn btn-danger btn-sm" id="btn-add">＋ Add</button>
    <button class="btn btn-secondary btn-sm" id="btn-edit">✏ Edit</button>
    <button class="btn btn-outline-danger btn-sm" id="btn-del">🗑 Delete</button>
  </div>
</div>
<div class="zmoto-card table-responsive">
  <table class="table table-hover mb-0">
    <thead><tr><th>ID</th><th>Name</th><th>CIN</th><th>Phone</th><th>Email</th><th>Address</th><th>Since</th><th>Total Spent</th></tr></thead>
    <tbody id="tbl"></tbody>
  </table>
</div>
<div class="modal fade" id="modalP" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="mtitle">Add Customer</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input type="hidden" id="pid">
      <div class="row g-2 mb-2">
        <div class="col-7"><label class="form-label">Name *</label><input class="form-control" id="p-name"></div>
        <div class="col-5"><label class="form-label">CIN *</label><input class="form-control" id="p-cin" placeholder="12345678" maxlength="8" inputmode="numeric"></div>
      </div>
      <div class="row g-2 mb-2">
        <div class="col-6"><label class="form-label">Phone</label><input class="form-control" id="p-phone" type="tel"></div>
        <div class="col-6"><label class="form-label">Email</label><input class="form-control" id="p-email" type="email"></div>
      </div>
      <div class="mb-2"><label class="form-label">Address</label><input class="form-control" id="p-addr"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button><button class="btn btn-danger btn-sm" id="btn-save">Save</button></div>
  </div></div>
</div>
{% endblock %}
{% block extra_js %}
<script>
let sel=null;
const modal=new bootstrap.Modal('#modalP');
function load(){
  apiG('/api/customers?q='+encodeURIComponent($('#search').val())).done(rows=>{
    const $t=$('#tbl').empty();
    rows.length ? rows.forEach(r=>{ $(`<tr><td>${r.id}</td><td><b>${r.name}</b></td><td>${r.cin||'—'}</td><td>${r.phone||'—'}</td><td>${r.email||'—'}</td><td>${r.address||'—'}</td><td>${(r.created_at||'').slice(0,10)}</td><td>${fmt(r.ts||0)} TND</td></tr>`).on('click',function(){$('#tbl tr').removeClass('table-active');$(this).addClass('table-active');sel=r;}).appendTo($t); })
              : $t.append('<tr><td colspan="8" class="text-center text-muted py-4">No customers</td></tr>');
  });
}
function openModal(d){
  $('#mtitle').text(d?'Edit Customer':'Add Customer'); $('#pid').val(d?.id||'');
  $('#p-name').val(d?.name||'');$('#p-cin').val(d?.cin||'');$('#p-phone').val(d?.phone||'');$('#p-email').val(d?.email||'');$('#p-addr').val(d?.address||'');
  modal.show();
}
$('#search').on('input',load);
$('#btn-add').on('click',()=>openModal(null));
$('#btn-edit').on('click',()=>{if(!sel){toast('Select a customer','error');return;}openModal(sel);});
$('#btn-save').on('click',()=>{
  const id=$('#pid').val(), body={name:$('#p-name').val().trim(),cin:$('#p-cin').val().trim(),phone:$('#p-phone').val().trim(),email:$('#p-email').val().trim(),address:$('#p-addr').val().trim()};
  if(!body.name){toast('Name required','error');return;}
  if(!body.cin){toast('CIN required','error');return;}
  (id?apiU('/api/customers/'+id,body):apiP('/api/customers',body))
    .done(()=>{modal.hide();toast(id?'Updated!':'Added!');sel=null;load();})
    .fail(r=>toast(r.responseJSON?.error||'Error','error'));
});
$('#btn-del').on('click',()=>{
  if(!sel){toast('Select a customer','error');return;}
  if(!confirm('Delete "'+sel.name+'"?'))return;
  apiD('/api/customers/'+sel.id).done(()=>{sel=null;toast('Deleted');load();});
});
load();

// Auto-open Add modal when arriving from dashboard quick action
if (new URLSearchParams(window.location.search).get('action') === 'add') {
  setTimeout(() => openModal(null), 150);
}
</script>
{% endblock %}

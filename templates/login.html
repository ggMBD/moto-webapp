<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Z-MOTO Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="login-body">
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-moto-icon">🏍</div>
      <div class="login-brand">Z-MOTO</div>
      <div class="login-sub">Manager v5.0</div>
    </div>
    <div id="login-error" class="alert alert-danger d-none py-2" role="alert"></div>
    <div class="mb-3">
      <label class="form-label">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input class="form-control" id="l-user" type="text" placeholder="Enter username" autocomplete="username">
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input class="form-control" id="l-pass" type="password" placeholder="Enter password" autocomplete="current-password">
      </div>
    </div>
    <button class="btn btn-danger w-100 btn-lg" id="btn-login">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </button>
    <div class="login-footer">Z-MOTO Parts & Repairs Management</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
const savedTheme = localStorage.getItem('zmoto-theme') || 'dark';
$('html').attr('data-theme', savedTheme);

function doLogin() {
  const u=$('#l-user').val().trim(), p=$('#l-pass').val();
  if (!u||!p) { showErr('Please enter username and password'); return; }
  $('#btn-login').prop('disabled',true).html('<span class="spinner-border spinner-border-sm me-2"></span>Signing in…');
  $.ajax({url:'/api/auth/login',method:'POST',contentType:'application/json',data:JSON.stringify({username:u,password:p})})
    .done(() => window.location.href='/dashboard')
    .fail(r => {
      showErr((r.responseJSON?.error) || 'Login failed');
      $('#btn-login').prop('disabled',false).html('<i class="bi bi-box-arrow-in-right me-2"></i>Sign In');
    });
}
function showErr(msg) {
  $('#login-error').text(msg).removeClass('d-none');
}
$('#btn-login').on('click', doLogin);
$('#l-user,#l-pass').on('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>

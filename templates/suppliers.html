{% extends "base.html" %}
{% set active = "suppliers" %}
{% block title %}Suppliers{% endblock %}
{% block page_title %}<i class="bi bi-building me-2 text-accent"></i>Suppliers{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Suppliers</h1>
  <button class="btn btn-danger btn-sm" onclick="openModal()"><i class="bi bi-plus-lg me-1"></i>Add Supplier</button>
</div>
<div class="zmoto-card p-3 mb-3">
  <div class="input-group input-group-sm" style="max-width:400px">
    <span class="input-group-text"><i class="bi bi-search"></i></span>
    <input class="form-control" id="sp-q" placeholder="Search by name or phone…">
  </div>
</div>
<div class="table-responsive">
  <table class="table">
    <thead><tr><th>Company Name</th><th>Phone</th><th>Email</th><th>Address</th><th>Notes</th><th>Actions</th></tr></thead>
    <tbody id="sp-tbody"><tr><td colspan="6" class="text-center py-4 text-muted-sm"><div class="spinner-border spinner-border-sm text-danger me-2"></div>Loading…</td></tr></tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal fade" id="modalSupplier" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="sp-title"><i class="bi bi-building me-2"></i>Add Supplier</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="sp-id">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Company Name *</label><input class="form-control" id="sp-name" placeholder="Supplier name"></div>
          <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" id="sp-phone" placeholder="+216…"></div>
          <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" id="sp-email" type="email"></div>
          <div class="col-md-6"><label class="form-label">Address</label><input class="form-control" id="sp-address" placeholder="City, region…"></div>
          <div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" id="sp-notes" rows="2" placeholder="Products supplied, payment terms…"></textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm" id="btn-save-supplier"><i class="bi bi-check-lg me-1"></i>Save</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
let suppliers = [];
function load(q='') {
  $.getJSON('/api/suppliers?q='+encodeURIComponent(q), data => {
    suppliers = data;
    if (!data.length) { $('#sp-tbody').html('<tr><td colspan="6" class="text-center py-4 text-muted-sm">No suppliers found</td></tr>'); return; }
    $('#sp-tbody').html(data.map(s => `<tr>
      <td><div class="d-flex align-items-center gap-2">
        <div class="avatar-circle-sm" style="background:#3742fa">${(s.name||'?').slice(0,2).toUpperCase()}</div>
        <strong>${s.name}</strong></div></td>
      <td>${s.phone||'—'}</td>
      <td class="text-muted-sm">${s.email||'—'}</td>
      <td class="text-muted-sm">${s.address||'—'}</td>
      <td class="text-muted-sm" style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.notes||'—'}</td>
      <td>
        <button class="btn btn-sm btn-outline-secondary py-0 me-1" onclick="openModal(${s.id})"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger py-0" onclick="delSupplier(${s.id},'${s.name.replace(/'/g,"\\'")}')"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join(''));
  });
}
let searchTimer;
$('#sp-q').on('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(() => load($('#sp-q').val()), 300); });

function openModal(id=null) {
  const s = id ? suppliers.find(x=>x.id===id) : null;
  $('#sp-title').html(s ? '<i class="bi bi-pencil me-2"></i>Edit Supplier' : '<i class="bi bi-building me-2"></i>Add Supplier');
  $('#sp-id').val(s?.id||''); $('#sp-name').val(s?.name||''); $('#sp-phone').val(s?.phone||'');
  $('#sp-email').val(s?.email||''); $('#sp-address').val(s?.address||''); $('#sp-notes').val(s?.notes||'');
  bootstrap.Modal.getOrCreateInstance(document.getElementById('#modalSupplier')).show();
}
$('#btn-save-supplier').on('click', () => {
  const id = $('#sp-id').val();
  if (!$('#sp-name').val().trim()) { toast('Name is required','error'); return; }
  const d = { name: $('#sp-name').val().trim(), phone: $('#sp-phone').val().trim(),
    email: $('#sp-email').val().trim(), address: $('#sp-address').val().trim(), notes: $('#sp-notes').val().trim() };
  const req = id ? apiU('/api/suppliers/'+id, d) : apiP('/api/suppliers', d);
  req.done(() => {
    bootstrap.Modal.getInstance('#modalSupplier')?.hide();
    toast(id ? 'Supplier updated!' : 'Supplier added!'); load($('#sp-q').val());
  }).fail(r => toast(r.responseJSON?.error||'Error','error'));
});
function delSupplier(id, name) {
  confirm_action(`Delete supplier "${name}"?`, () => {
    apiD('/api/suppliers/'+id).done(() => { toast('Supplier deleted'); load($('#sp-q').val()); })
      .fail(r => toast(r.responseJSON?.error||'Error','error'));
  });
}
load();
</script>
{% endblock %}

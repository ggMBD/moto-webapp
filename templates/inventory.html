{% extends "base.html" %}
{% set active = "inventory" %}
{% block title %}Inventory{% endblock %}
{% block page_title %}<i class="bi bi-boxes me-2 text-accent"></i>Inventory{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Inventory</h1>
  <button class="btn btn-danger btn-sm" onclick="openModal()"><i class="bi bi-plus-lg me-1"></i>Add Product</button>
</div>

<div class="zmoto-card p-3 mb-3">
  <div class="row g-2 align-items-center">
    <div class="col-md-5">
      <div class="input-group input-group-sm">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input class="form-control" id="q" placeholder="Search by name, ref, category, brand…">
      </div>
    </div>
    <div class="col-auto ms-auto">
      <span class="text-muted-sm" id="product-count"></span>
    </div>
  </div>
</div>

<div class="table-responsive">
  <table class="table">
    <thead><tr><th>Ref</th><th>Name</th><th>Category</th><th>Brand</th><th>Stock</th><th>Buy Price</th><th>Sell Price</th><th>Actions</th></tr></thead>
    <tbody id="inv-tbody"><tr><td colspan="8" class="text-center py-4 text-muted-sm"><div class="spinner-border spinner-border-sm text-danger me-2"></div>Loading…</td></tr></tbody>
  </table>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="modalProduct" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-title"><i class="bi bi-boxes me-2"></i>Add Product</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="p-id">
        <div class="row g-3">
          <div class="col-md-4"><label class="form-label">Reference *</label><input class="form-control" id="p-ref" placeholder="e.g. BRK-001"></div>
          <div class="col-md-8"><label class="form-label">Product Name *</label><input class="form-control" id="p-name" placeholder="Full product name"></div>
          <div class="col-md-4"><label class="form-label">Category</label><input class="form-control" id="p-cat" placeholder="e.g. Brakes"></div>
          <div class="col-md-4"><label class="form-label">Brand</label><input class="form-control" id="p-brand" placeholder="e.g. Brembo"></div>
          <div class="col-md-4"><label class="form-label">Quantity in Stock</label><input class="form-control" id="p-qty" type="number" min="0" value="0"></div>
          <div class="col-md-4"><label class="form-label">Buy Price (TND)</label><input class="form-control" id="p-buy" type="number" step="0.001" min="0" value="0"></div>
          <div class="col-md-4"><label class="form-label">Sell Price (TND)</label><input class="form-control" id="p-sell" type="number" step="0.001" min="0" value="0"></div>
          <div class="col-md-4"><label class="form-label">Min Stock Alert</label><input class="form-control" id="p-min" type="number" min="0" value="5"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm" id="btn-save-product"><i class="bi bi-check-lg me-1"></i>Save</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
let products = [];

function load(q='') {
  $.getJSON('/api/products?q='+encodeURIComponent(q), data => {
    products = data;
    $('#product-count').text(data.length + ' products');
    if (!data.length) {
      $('#inv-tbody').html('<tr><td colspan="8" class="text-center py-4 text-muted-sm">No products found</td></tr>');
      return;
    }
    $('#inv-tbody').html(data.map(p => {
      const stockClass = p.qty === 0 ? 'stock-zero' : p.qty <= p.min_stock ? 'stock-low' : 'stock-ok';
      const margin = p.buy_price > 0 ? (((p.sell_price - p.buy_price)/p.buy_price)*100).toFixed(1)+'%' : '—';
      return `<tr>
        <td class="mono text-muted-sm">${p.ref}</td>
        <td><strong>${p.name}</strong></td>
        <td>${p.category||'—'}</td>
        <td>${p.brand||'—'}</td>
        <td class="${stockClass}">${p.qty} <small style="font-size:.7rem;opacity:.7">/ min ${p.min_stock}</small></td>
        <td class="mono">${fmt2(p.buy_price)} TND</td>
        <td class="mono">${fmt2(p.sell_price)} TND <small class="text-muted-sm">(${margin})</small></td>
        <td>
          <button class="btn btn-sm btn-outline-secondary py-0 me-1" onclick="editProduct(${p.id})"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger py-0" onclick="delProduct(${p.id},'${p.name.replace(/'/g,"\\'")}')"><i class="bi bi-trash"></i></button>
        </td>
      </tr>`;
    }).join(''));
  });
}

let searchTimer;
$('#q').on('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(() => load($('#q').val()), 300); });

function openModal(p=null) {
  const m = bootstrap.Modal.getOrCreateInstance(document.getElementById('#modalProduct'));
  if (p) {
    $('#modal-title').html('<i class="bi bi-pencil me-2"></i>Edit Product');
    $('#p-id').val(p.id); $('#p-ref').val(p.ref); $('#p-name').val(p.name);
    $('#p-cat').val(p.category); $('#p-brand').val(p.brand); $('#p-qty').val(p.qty);
    $('#p-buy').val(p.buy_price); $('#p-sell').val(p.sell_price); $('#p-min').val(p.min_stock);
  } else {
    $('#modal-title').html('<i class="bi bi-plus-lg me-2"></i>Add Product');
    $('#p-id').val(''); $('#p-ref,#p-name,#p-cat,#p-brand').val('');
    $('#p-qty,#p-buy,#p-sell').val(0); $('#p-min').val(5);
  }
  m.show();
}

function editProduct(id) { openModal(products.find(p=>p.id===id)); }

function delProduct(id, name) {
  confirm_action(`Delete "${name}"?`, () => {
    apiD('/api/products/'+id).done(() => { toast('Product deleted'); load($('#q').val()); })
      .fail(r => toast(r.responseJSON?.error||'Error','error'));
  });
}

$('#btn-save-product').on('click', () => {
  const id = $('#p-id').val();
  const d = {
    ref: $('#p-ref').val().trim(), name: $('#p-name').val().trim(),
    category: $('#p-cat').val().trim(), brand: $('#p-brand').val().trim(),
    qty: parseInt($('#p-qty').val()||0), buy_price: parseFloat($('#p-buy').val()||0),
    sell_price: parseFloat($('#p-sell').val()||0), min_stock: parseInt($('#p-min').val()||5)
  };
  if (!d.ref || !d.name) { toast('Ref and Name are required','error'); return; }
  const req = id ? apiU('/api/products/'+id, d) : apiP('/api/products', d);
  req.done(() => {
    bootstrap.Modal.getInstance('#modalProduct')?.hide();
    toast(id ? 'Product updated!' : 'Product added!');
    load($('#q').val());
  }).fail(r => toast(r.responseJSON?.error||'Error','error'));
});

load();
</script>
{% endblock %}

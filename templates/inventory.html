{% extends "base.html" %}
{% set active = "inventory" %}
{% block title %}Inventory{% endblock %}
{% block page_title %}📦 Inventory{% endblock %}

{% block content %}
<div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
  <input class="form-control" id="inv-search" placeholder="🔍 Search parts…" style="max-width:280px">
  <div class="d-flex gap-2">
    <button class="btn btn-danger btn-sm" id="btn-add"><i>＋</i> Add Part</button>
    <button class="btn btn-secondary btn-sm" id="btn-edit">✏ Edit</button>
    <button class="btn btn-outline-danger btn-sm" id="btn-delete">🗑 Delete</button>
  </div>
</div>
<div class="zmoto-card table-responsive">
  <table class="table table-hover mb-0">
    <thead><tr><th>Ref</th><th>Name</th><th>Category</th><th>Brand</th><th>Qty</th><th>Buy</th><th>Sell</th><th>Min</th><th>Status</th></tr></thead>
    <tbody id="tbl"></tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal fade" id="modalProduct" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-title">Add Part</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="pid">
        <div class="row g-2 mb-2">
          <div class="col-6"><label class="form-label">Ref *</label><input class="form-control" id="p-ref" placeholder="EX-001"></div>
          <div class="col-6"><label class="form-label">Name *</label><input class="form-control" id="p-name"></div>
        </div>
        <div class="row g-2 mb-2">
          <div class="col-6"><label class="form-label">Category</label><input class="form-control" id="p-cat"></div>
          <div class="col-6"><label class="form-label">Brand</label><input class="form-control" id="p-brand"></div>
        </div>
        <div class="row g-2 mb-2">
          <div class="col-6"><label class="form-label">Qty</label><input class="form-control" id="p-qty" type="number" value="0"></div>
          <div class="col-6"><label class="form-label">Min Stock</label><input class="form-control" id="p-min" type="number" value="5"></div>
        </div>
        <div class="row g-2">
          <div class="col-6"><label class="form-label">Buy Price (TND)</label><input class="form-control" id="p-buy" type="number" step="0.01" value="0"></div>
          <div class="col-6"><label class="form-label">Sell Price (TND)</label><input class="form-control" id="p-sell" type="number" step="0.01" value="0"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm" id="btn-save">Save Part</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let sel = null;
const modal = new bootstrap.Modal('#modalProduct');

function load() {
  apiG('/api/products?q='+encodeURIComponent($('#inv-search').val())).done(function(rows) {
    const $t = $('#tbl').empty();
    if (!rows.length) { $t.append('<tr><td colspan="9" class="text-center text-muted py-4">No products found</td></tr>'); return; }
    rows.forEach(r => {
      const low = r.qty <= r.min_stock;
      $(`<tr>
        <td><b>${r.ref}</b></td><td>${r.name}</td><td>${r.category||'—'}</td><td>${r.brand||'—'}</td>
        <td>${r.qty}</td><td>${fmt(r.buy_price)}</td><td>${fmt(r.sell_price)}</td><td>${r.min_stock}</td>
        <td><span class="badge ${low?'status-waiting_parts':'status-done'}">${low?'Low':'OK'}</span></td>
      </tr>`).on('click', function(){ $('#tbl tr').removeClass('table-active'); $(this).addClass('table-active'); sel=r; }).appendTo($t);
    });
  });
}

function openModal(d) {
  $('#modal-title').text(d?'Edit Part':'Add Part');
  $('#pid').val(d?.id||''); $('#p-ref').val(d?.ref||''); $('#p-name').val(d?.name||'');
  $('#p-cat').val(d?.category||''); $('#p-brand').val(d?.brand||'');
  $('#p-qty').val(d?.qty??0); $('#p-min').val(d?.min_stock??5);
  $('#p-buy').val(d?.buy_price??0); $('#p-sell').val(d?.sell_price??0);
  modal.show();
}

$('#inv-search').on('input', load);
$('#btn-add').on('click', () => openModal(null));
$('#btn-edit').on('click', () => { if (!sel) { toast('Select a product first','error'); return; } openModal(sel); });
$('#btn-save').on('click', function() {
  const id = $('#pid').val();
  const body = { ref:$('#p-ref').val().trim(), name:$('#p-name').val().trim(), category:$('#p-cat').val().trim(), brand:$('#p-brand').val().trim(), qty:parseInt($('#p-qty').val())||0, min_stock:parseInt($('#p-min').val())||5, buy_price:parseFloat($('#p-buy').val())||0, sell_price:parseFloat($('#p-sell').val())||0 };
  if (!body.ref||!body.name) { toast('Ref and Name required','error'); return; }
  (id ? apiU('/api/products/'+id,body) : apiP('/api/products',body))
    .done(() => { modal.hide(); toast(id?'Updated!':'Added!'); sel=null; load(); })
    .fail(r => toast(r.responseJSON?.error||'Error','error'));
});
$('#btn-delete').on('click', function() {
  if (!sel) { toast('Select a product first','error'); return; }
  if (!confirm('Delete "'+sel.name+'"?')) return;
  apiD('/api/products/'+sel.id).done(() => { sel=null; toast('Deleted'); load(); });
});

load();
</script>
{% endblock %}
